name: Build Cydia iOS

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Build Cydia (iOS)
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
        fetch-tags: true

    - name: Install dependencies
      run: |
        brew install make dpkg libffi ldid

    - name: Setup Theos
      run: |
        git clone --recursive --depth 1 https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH
        
    - name: Download iOS SDK
      run: |
        mkdir -p $THEOS/sdks
        echo "=== Downloading iPhoneOS SDK ==="
        cd /tmp
        curl -L -o iPhoneOS16.2.sdk.tar.xz "https://github.com/wyxdlz54188/Old_IOS_TERM/releases/download/sdk-v1.0/iPhoneOS16.2.sdk.tar.xz" || {
          echo "Failed to download from Old_IOS_TERM, trying alternative..."
          curl -L -o iPhoneOS16.2.sdk.tar.xz "https://github.com/xybp888/iOS-SDKs/archive/refs/heads/master.tar.gz" && \
          tar -xf master.tar.gz && mv iOS-SDKs-master/iPhoneOS16.2.sdk $THEOS/sdks/ && rm -rf iOS-SDKs-master master.tar.gz || \
          echo "SDK download failed, will try with available SDK"
        }
        
        # Check what's in the download
        ls -la $THEOS/sdks/ 2>/dev/null || echo "No SDK found in THEOS/sdks"
        
        # If no SDK downloaded, check available Xcode SDKs
        if [ ! -d "$THEOS/sdks/iPhoneOS16.2.sdk" ]; then
          echo "Using Xcode's built-in iOS SDK instead..."
          SDK_PATH=$(xcodebuild -sdk iphoneos -version Path 2>/dev/null || echo "")
          if [ -n "$SDK_PATH" ]; then
            echo "Found SDK at: $SDK_PATH"
            # Extract and copy to THEOS for reference
            SDK_NAME=$(basename "$SDK_PATH" .sdk)
            echo "SDK will be used from: $SDK_PATH"
            echo "Available SDKs:"
            xcodebuild -showsdks
          fi
        fi
        echo ""
        echo "=== Final SDKs list ==="
        ls -la $THEOS/sdks/ 2>/dev/null
        
    - name: Build Cydia
      run: |
        export THEOS="$HOME/theos"
        export PATH="$THEOS/bin:$PATH"
        export LANG=C
        
        # Get the actual SDK path from Xcode
        export SDKROOT=$(xcodebuild -sdk iphoneos -version Path)
        export DEVELOPER_DIR=$(xcode-select -p)
        
        echo "Building with:"
        echo "  THEOS=$THEOS"
        echo "  SDKROOT=$SDKROOT"
        echo "  DEVELOPER_DIR=$DEVELOPER_DIR"
        echo "  ARCHS=arm64"
        
        make package
        ls -la packages/

    - name: Upload Cydia deb
      uses: actions/upload-artifact@v4
      with:
        name: cydia-deb
        path: packages/*.deb