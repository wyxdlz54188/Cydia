name: Build Cydia iOS with Theos

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Cydia (iOS)
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
        fetch-tags: true

    - name: Install dependencies
      run: |
        brew install make dpkg ldid libffi

    - name: Setup Theos
      run: |
        git clone --recursive --depth 1 https://github.com/theos/theos.git $HOME/theos
        git clone --recursive --depth 1 https://github.com/theos/sdks.git $HOME/theos/sdks
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH

    - name: Download iOS SDK
      run: |
        echo "Downloading iOS SDK..."
        cd $THEOS/sdks
        curl -L -o iPhoneOS16.2.sdk.tar.xz "https://github.com/theos/sdks/raw/master/iPhoneOS16.2.sdk.tar.xz"
        tar -xf iPhoneOS16.2.sdk.tar.xz
        rm iPhoneOS16.2.sdk.tar.xz
        ls -la $THEOS/sdks/

    - name: Build Cydia
      run: |
        export THEOS="$HOME/theos"
        export PATH="$THEOS/bin:$PATH"
        export LANG=C
        make package

    - name: List packages
      run: |
        ls -la packages/

    - name: Upload Cydia deb
      uses: actions/upload-artifact@v4
      with:
        name: cydia-deb
        path: packages/*.deb